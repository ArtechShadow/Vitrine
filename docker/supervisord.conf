[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisor/supervisord.pid
childlogdir=/var/log/supervisor

[program:comfyui]
# GPU 0: this container is allocated a single GPU (compose device_ids: ['0']),
# so device 1 does not exist inside it — pinning to 1 crashed ComfyUI on startup
# with "No CUDA GPUs are available" (torch.cuda.device_count()==1).
command=/usr/bin/python3.12 /opt/comfyui/main.py --listen 0.0.0.0 --port 8188 --cuda-device 0 --preview-method auto
directory=/opt/comfyui
environment=DISPLAY=":1",CUDA_VISIBLE_DEVICES="0"
autorestart=true
priority=40
startretries=5
startsecs=10
stdout_logfile=/var/log/supervisor/comfyui.log
stderr_logfile=/var/log/supervisor/comfyui-err.log

[program:web-interface]
command=/usr/bin/python3.12 /opt/web-interface/app.py
directory=/opt/web-interface
user=ubuntu
environment=HOME="/home/ubuntu",TERM="xterm-256color"
autorestart=true
priority=50
stdout_logfile=/var/log/supervisor/web-interface.log
stderr_logfile=/var/log/supervisor/web-interface-err.log

[program:terminal]
# Internal-Claude control surface — GATED behind VITRINE_CLAUDE_ENABLED (ADR-024).
# The wrapper starts ttyd (bound to 127.0.0.1) only when the operator opts in at
# setup; otherwise it exits 0 and, with autorestart=unexpected, supervisord
# leaves it EXITED so :7681 has no listener. Default posture: web panel only.
command=/bin/bash /opt/vitrine-terminal.sh
directory=/opt/gaussian-toolkit
user=ubuntu
# supervisord runs as root and does NOT set HOME for user= programs; without
# this the terminal inherits HOME=/root and `claude` login hangs (can't reach
# /home/ubuntu/.claude). Also fixed at runtime by /etc/profile.d/00-home.sh.
# VITRINE_CLAUDE_ENABLED is inherited from the container env (compose).
environment=HOME="/home/ubuntu",USER="ubuntu",LOGNAME="ubuntu"
autorestart=unexpected
exitcodes=0
priority=60
startretries=3
startsecs=2
stdout_logfile=/var/log/supervisor/terminal.log
stderr_logfile=/var/log/supervisor/terminal-err.log
