; URemoteControlSettings is UCLASS(config=RemoteControl) in the RemoteControlCommon module,
; so its flags are read from THIS file (DefaultRemoteControl.ini), NOT DefaultEngine.ini.
; CanBeAccessedRemotely() blocks PythonScriptLibrary unless bEnableRemotePythonExecution is
; true here. Trusted local headless container behind the bridge (ADR-016).
[/Script/RemoteControlCommon.RemoteControlSettings]
bEnableRemotePythonExecution=True
bAllowConsoleCommandRemoteExecution=True
bAllowAnyRemoteFunctionCall=True
bRestrictServerAccess=False
