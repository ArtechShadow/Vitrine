; Vitrine UE 5.8 project config (ADR-016).
;
; Web Remote Control's HTTP API (:30010) is served by UE's FHttpServerModule,
; which binds to "localhost" by default (HttpServerConfig.cpp). The unreal-mcp-bridge
; and the agent/VisionFlow stack run in OTHER containers, so the loopback bind makes
; RC unreachable cross-container. Bind all interfaces instead ("0.0.0.0"/"any" ->
; SetAnyAddress). Verified against the engine source 2026-06-21.
[HTTPServer.Listeners]
DefaultBindAddress=0.0.0.0

; Remote Control server ports + bind (URemoteControlSettings lives in the
; RemoteControlCommon module). Ports match the -RCWebControlPort CLI flag; the
; websocket already defaults to 0.0.0.0 but pin it for clarity.
[/Script/RemoteControlCommon.RemoteControlSettings]
RemoteControlHttpServerPort=30010
RemoteControlWebSocketServerPort=30020
RemoteControlWebsocketServerBindAddress=0.0.0.0
bAutoStartWebServer=True
bAutoStartWebSocketServer=True
; Enable remote Python + console execution so the agent can drive the live editor
; (lighting, interactivity, screenshots) via RC PythonScriptLibrary.execute_python_command
; and ExecuteConsoleCommand. This is a trusted local-only deployment (headless
; container behind the bridge). bRestrictServerAccess stays false (LAN-internal).
bEnableRemotePythonExecution=True
bAllowConsoleCommandRemoteExecution=True
bAllowAnyRemoteFunctionCall=True

; The access-control flags actually live on URemoteControlSettings in the RemoteControl
; module (the section above is RemoteControlCommon = ports only). Without this section,
; RC blocks PythonScriptLibrary ("cannot be accessed remotely"). Trusted local container.
[/Script/RemoteControl.RemoteControlSettings]
bEnableRemotePythonExecution=True
bAllowConsoleCommandRemoteExecution=True
bAllowAnyRemoteFunctionCall=True
bRestrictServerAccess=False
